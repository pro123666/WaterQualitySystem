{% extends "water_quality.html" %}

{% block page_content %}
<!-- 页面5：超标告警 -->
<div id="pageAlert" class="page active">
  <div class="stats-row">
    <div class="stat-card">
      <div class="label">今日告警次数</div>
      <div class="value" id="statToday">0</div>
    </div>
    <div class="stat-card">
      <div class="label">本周告警次数</div>
      <div class="value" id="statWeek">0</div>
    </div>
  </div>
  <div class="alert-layout">
    <div class="card">
      <h3 class="card-title">告警列表</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>监测点</th>
              <th>日期</th>
              <th>超标指标</th>
              <th>当前值</th>
              <th>阈值</th>
              <th>告警时间</th>
            </tr>
          </thead>
          <tbody id="alertTableBody"></tbody>
        </table>
      </div>
    </div>
    <div class="threshold-panel">
      <div class="panel-header" id="thresholdToggle">
        <span>阈值配置</span>
        <span>▼</span>
      </div>
      <div class="threshold-body">
        <div class="form-group" style="margin-bottom: 12px;">
          <label>余氯上限 (mg/L)</label>
          <input type="number" id="thFCR" step="0.01" value="0.3" readonly style="background:#f5f5f5; cursor:not-allowed;" />
        </div>
        <div class="form-group" style="margin-bottom: 12px;">
          <label>PH 范围 (下限~上限)</label>
          <div style="display: flex; gap: 8px;">
            <input type="number" id="thPHMin" step="0.01" value="6.5" style="flex:1; background:#f5f5f5; cursor:not-allowed;" readonly />
            <input type="number" id="thPHMax" step="0.01" value="8.5" style="flex:1; background:#f5f5f5; cursor:not-allowed;" readonly />
          </div>
        </div>
        <div class="form-group" style="margin-bottom: 12px;">
          <label>电导率上限 (μS/cm)</label>
          <input type="number" id="thECR" value="1000" readonly style="background:#f5f5f5; cursor:not-allowed;" />
        </div>
        <div class="form-group" style="margin-bottom: 12px;">
          <label>ORP 下限 (mV)</label>
          <input type="number" id="thORP" value="500" readonly style="background:#f5f5f5; cursor:not-allowed;" />
        </div>
        <div class="form-group" style="margin-bottom: 12px;">
          <label>浊度上限 (NTU)</label>
          <input type="number" id="thNTU" step="0.01" value="1" readonly style="background:#f5f5f5; cursor:not-allowed;" />
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
